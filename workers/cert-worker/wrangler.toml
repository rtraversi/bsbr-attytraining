name            = "bsbr-cert-worker"
main            = "src/index.ts"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
# */5 * * * * — cert generation queue drain (every 5 min)
# 0 9 * * *   — daily expiry + inactivity reminders at 9am UTC
crons = ["*/5 * * * *", "0 9 * * *"]

[vars]
# Non-secret config — override per environment below
SUPABASE_URL = "https://ndmzvtuywcufvkxtkjhg.supabase.co"   # fill in before first deploy
APP_URL = "https://bsbr-attytraining.aistaffcompliance.workers.dev"        # fill in with deployed *.workers.dev URL before first deploy

# Secrets (never commit values — set with `wrangler secret put <KEY>`):
#   WEBHOOK_SECRET              — shared secret validated in X-Webhook-Secret header
#   SUPABASE_SERVICE_ROLE_KEY   — Supabase service-role key (bypasses RLS)
#   RESEND_API_KEY              — Resend transactional email key
#   CERT_WEBHOOK_SECRET         — shared secret for the Next.js /api/certs/drain endpoint

# ---------------------------------------------------------------------------
# Staging environment
# Override SUPABASE_URL and secrets for the staging Supabase project.
# Set staging secrets with: wrangler secret put <KEY> --env staging
# ---------------------------------------------------------------------------
[env.staging]
name = "bsbr-cert-worker-staging"

[env.staging.vars]
SUPABASE_URL = ""   # staging Supabase project URL
APP_URL = ""        # staging Next.js app URL
