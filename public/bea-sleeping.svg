<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Bea — sleeping</title>

  <!-- Left ear (behind envelope, pokes from top-left corner) -->
  <polygon points="32,82 18,52 56,76" fill="#8B4513"/>

  <!-- Right ear (behind envelope, pokes from top-right corner) -->
  <polygon points="168,82 144,76 182,52" fill="#8B4513"/>

  <!-- Envelope body (brown rectangle) -->
  <rect x="32" y="82" width="136" height="92" fill="#8B4513"/>

  <!-- Envelope flap (tan V — classic sealed-flap shape) -->
  <polygon points="32,82 100,132 168,82" fill="#F5DEB3"/>

  <!-- Envelope fold lines (subtle crease detail) -->
  <line x1="32" y1="174" x2="100" y2="132" stroke="#6B2E08" stroke-width="1.5" opacity="0.35"/>
  <line x1="168" y1="174" x2="100" y2="132" stroke="#6B2E08" stroke-width="1.5" opacity="0.35"/>

  <!-- Closed eyes (upward-arcing curves = sleeping) -->
  <path d="M 72,150 Q 84,141 96,150" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 104,150 Q 116,141 128,150" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
